name: Build Docker Images

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push backend
      uses: docker/build-push-action@v6
      with:
        context: ./server
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/kuborder-backend:latest

    - name: Build and push frontend
      uses: docker/build-push-action@v6
      with:
        context: ./client
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/kuborder-frontend:latest